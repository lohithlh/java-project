apiVersion: apps/v1
kind: Deployment

metadata:
  name: java-project

spec:
  replicas: 2

  selector:
    matchLabels:
      app: java-project

  template:
    metadata:
      labels:
        app: java-project

    spec:
      containers:

      - name: java-project

        image: 239762172856.dkr.ecr.ap-south-2.amazonaws.com/java-app:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 8080
